---
- name: Instalação do Docker
  hosts: all
  become: true
  tasks:
    - name: Atualizar cache de pacotes
      apt:
        update_cache: yes          
    - name: Instalar Dependências do Docker
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg2
          - software-properties-common
        state: present
    - name: Permissão Diretório keyrings
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'
    - name: Adicionar chave GPG do Docker      
      apt_key:
        url: https://download.docker.com/linux/debian/gpg
        state: present
    - name: Adicionar repostitório do Docker
      apt_repository:
        repo: deb [arch=amd64] https://download.docker.com/linux/debian buster stable
        state: present
    - name: Atualizar cache de pacotes 2x
      apt:
        update_cache: yes
    - name: Instalar Docker
      apt:
        name: docker-ce
        state: present
    - name: Adicionar usuário ao grupo Docker
      user:
        name: vagrant
        groups: docker
        append: yes
    - name: Reiniciar serviço do Docker
      service :
        name: docker
        state: restarted
