---
- hosts: db
  become: yes
  tasks:
    - name: 'Instalação de Pacotes BD'
      apt:
        pkg:
          - mariadb-server
          - wget
          - zip
          - curl
          - vim
          - python3-mysqldb
        state: present
    - name: 'Criando DB Backup'
      mysql_db:
        name: backup
        login_user: root
        login_password: ""
        state: present
    - name: 'Importação Base de Dados backup.sql'
      mysql_db:
        login_user: root
        login_password: ""
        state: import
        name: backup
        target: /tmp/backup.sql
    - name: 'Criação de Usuário Express no Mysql'
      mysql_user:
        host: '%'
        login_user: root
        login_password: ""
        name: express
        password: 'AllSafe0!'
        priv: 'backup.*:ALL'
        state: present
    - name: 'Substituir Bind do Mysql'
      replace:
        path: /etc/mysql/mariadb.conf.d/50-server.cnf
        regexp: '127\.0\.0\.1'
        replace: '0.0.0.0'
      notify: Restart Mysql

  handlers:
    - name: Restart Mysql
      service:
        name: mariadb
        state: restarted
        enabled: yes  
